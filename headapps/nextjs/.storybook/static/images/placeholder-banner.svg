<svg width="1920" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#f9fafb"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <text x="50%" y="45%" text-anchor="middle" dy=".3em" fill="#374151" font-family="Arial, sans-serif" font-size="36" font-weight="bold">
    Sample Banner Image
  </text>
  <text x="50%" y="55%" text-anchor="middle" dy=".3em" fill="#6b7280" font-family="Arial, sans-serif" font-size="18">
    1920 × 600 • Storybook Only
  </text>
</svg>
