- ID: "17bb046a-a32a-41b3-8315-81217947611b"
  Hint: ComponentQuery
  Value: |
    query GetPolicyStatements($datasource: String!, $language: String!) {
      PolicyStatementsData: item(path: $datasource, language: $language) {
        CountryLabel: field(name: "CountryLabel") {
          value
        }
        LanguageLabel: field(name: "LanguageLabel") {
          value
        }
        Countries: field(name: "Countries") {
          ... on MultilistField {
            data: targetItems {
              ...countryPolicyStatementsData
            }
          }
        }
      }
    }
    
    fragment countryPolicyStatementsData on CountryPolicyStatement { 
      Country: field(name: "Country") {
         ... on  LookupField{
            data: targetItem {
              ...policyCountryData
            }
          }
      }
      CountryLink: url{
        path    
      }
    }
    
    fragment policyCountryData on Country{
      Name : name
      Code: code{
        value
      }  
    }
    
